<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вхід — Система керування освітленням</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      color: #fff;
    }
    .card h1 { font-size: 1.4rem; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; font-size: 0.85rem; color: #a0aec0; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: #cbd5e0; }
    input {
      width: 100%; padding: 10px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; color: #fff; font-size: 0.95rem;
      margin-bottom: 18px; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #63b3ed; }
    button {
      width: 100%; padding: 12px;
      background: #3182ce; color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #2b6cb0; }
    .error { background: rgba(229,62,62,.2); border: 1px solid #fc8181;
             color: #fc8181; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: .85rem; }
    .link { text-align: center; margin-top: 18px; font-size: .85rem; color: #a0aec0; }
    .link a { color: #63b3ed; text-decoration: none; }
    .icon { font-size: 2.4rem; text-align: center; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💡</div>
    <h1>Освітлення міста</h1>
    <p class="subtitle">Вхід до системи керування</p>

    <div id="error" class="error" style="display:none"></div>

    <label>Email</label>
    <input type="email" id="email" placeholder="you@city.gov.ua" autocomplete="username">

    <label>Пароль</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

    <button id="loginBtn">Увійти</button>
    <p class="link">Немає акаунту? <a href="/register.html">Зареєструватись</a></p>
  </div>

  <script>
    const emailEl = document.getElementById('email');
    const passEl  = document.getElementById('password');
    const errEl   = document.getElementById('error');
    const btn     = document.getElementById('loginBtn');

    async function login() {
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Вхід...';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailEl.value, password: passEl.value }),
          credentials: 'include',
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/dashboard.html';
        } else {
          showError(data.error || 'Помилка входу');
        }
      } catch (e) {
        showError('Помилка мережі. Перевірте з\'єднання.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Увійти';
      }
    }

    function showError(msg) {
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    btn.addEventListener('click', login);
    [emailEl, passEl].forEach(el => el.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    }));
  </script>
</body>
</html>
